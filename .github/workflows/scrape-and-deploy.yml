name: Scrape rates and deploy dashboard

on:
  workflow_dispatch:
  schedule:
    # 12:00 UTC = 6:00 a.m. CDMX aprox. Ajustar si quieres otro horario.
    - cron: "0 12 * * *"
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        run: npm run scrape

      - name: Prepare static site
        run: |
          mkdir -p public
          cp dashboard-real.html public/index.html
          cp dashboard-real.html public/dashboard-real.html
          cp dashboard-plaza-demo.html public/dashboard-plaza-demo.html
          cp -R data public/data
          cp -R debug public/debug || true
          cp README.md public/README.md || true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
